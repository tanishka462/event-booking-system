version: '3.8'

services:

  app:

    build: .

    ports:

      - "5000:5000"

    depends_on:

      - mysql

    environment:

      DB_HOST: mysql

      DB_USER: root

      DB_PASS: root

      DB_NAME: event_booking

  mysql:

    image: mysql:8

    restart: always

    environment:

      MYSQL_ROOT_PASSWORD: root

      MYSQL_DATABASE: event_booking

    ports:

      - "3307:3306"